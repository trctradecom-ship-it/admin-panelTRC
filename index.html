<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body {
  background: #0f172a;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 100px;
}
button {
  padding: 12px 20px;
  margin: 10px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}
#walletAddress { font-weight: bold; }
#status { margin-top: 15px; font-weight: bold; }
</style>

</head>
<body>

<h1>Admin Panel</h1>

<button onclick="connectWallet()">Connect Wallet</button>
<p id="walletAddress">Not Connected</p>
<p id="status"></p>
<button onclick="withdrawLiquidity()">Withdraw Liquidity Tokens</button>

<!-- ✅ LOAD ETHERS -->
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<script>
// ================= CONFIG =================
const CONTRACT = "0xc08983be707bf4b763e7A0f3cCAD3fd00af6620d";

const abi = [
  "function withdrawLiquidityTokens()",
  "function owner() view returns(address)"
];

let provider, signer, contract, user;

// ================= CONNECT WALLET =================
async function connectWallet() {
  try {
    if (!window.ethereum) {
      alert("Install MetaMask or compatible wallet");
      return;
    }

    // ✅ FAST: Initialize provider immediately
    provider = new ethers.providers.Web3Provider(window.ethereum, "any");
    
    // Prompt user to connect
    const accounts = await provider.send("eth_requestAccounts", []);
    signer = provider.getSigner();
    user = await signer.getAddress();

    // Display wallet address instantly
    document.getElementById("walletAddress").innerText =
      user.slice(0,6) + "..." + user.slice(-4);

    // Connect contract
    contract = new ethers.Contract(CONTRACT, abi, signer);

    // Check owner
    const owner = await contract.owner();
    if(user.toLowerCase() === owner.toLowerCase()) {
      document.getElementById("status").innerText = "✅ Owner Connected";
    } else {
      document.getElementById("status").innerText = "⚠️ Not Owner";
    }

    // ✅ Optional: Listen for account/network changes
    window.ethereum.on("accountsChanged", () => location.reload());
    window.ethereum.on("chainChanged", () => location.reload());

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "❌ " + (err.message || "Connection failed");
  }
}

// ================= WITHDRAW =================
async function withdrawLiquidity() {
  try {
    if (!contract) {
      alert("Connect wallet first");
      return;
    }

    document.getElementById("status").innerText = "Sending...";

    const tx = await contract.withdrawLiquidityTokens();
    await tx.wait();

    document.getElementById("status").innerText = "✅ Success";

  } catch (e) {
    console.error(e);
    document.getElementById("status").innerText =
      "❌ " + (e.reason || e.message);
  }
}
</script>

</body>
</html>
